# ELK Stack - Logstash Pipeline Configuration
# Ingests logs from Filebeat, parses them, and indexes them in Elasticsearch

input {
  beats {
    port => 5044
  }
}

filter {
  if [headers][request_path] =~ "health" or [message] =~ "health" {
    # Drop health check spam logs to conserve storage space
    drop { }
  }

  grok {
    # Match the Flask logging basicConfig format:
    # 2026-06-21 20:57:46,789 INFO kyc_app User logged in: admin
    match => { 
      "message" => "%{TIMESTAMP_ISO8601:log_timestamp} %{LOGLEVEL:log_level} %{WORD:app_logger} %{GREEDYDATA:log_message}" 
    }
  }

  date {
    # Parse log_timestamp to replace the Elasticsearch @timestamp field
    match => [ "log_timestamp", "yyyy-MM-dd HH:mm:ss,SSS" ]
    target => "@timestamp"
    timezone => "UTC"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "digital-kyc-logs-%{+YYYY.MM.dd}"
  }
  
  stdout {
    codec => rubydebug
  }
}
